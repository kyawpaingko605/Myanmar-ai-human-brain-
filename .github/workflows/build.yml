name: Build Android APK with Buildozer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install System Dependencies for Buildozer
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev xclip libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
        python -m pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Build APK using GitHub's Android SDK
      env:
        # GitHub Runner မှာ အသင့်ပါတဲ့ Android SDK လမ်းကြောင်းကို တိုက်ရိုက်ညွှန်ပေးလိုက်တာပါ
        ANDROID_HOME: /usr/local/lib/android/sdk
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      run: |
        # buildozer.spec ဖိုင် မရှိသေးရင် အလိုအလျောက် ဆောက်ခိုင်းမယ်
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        
        # GitHub ရဲ့ အသင့်ပါပြီးသား SDK ကို သုံးဖို့အတွက် spec ဖိုင်ထဲမှာ လမ်းကြောင်း ပြင်ပေးလိုက်တာပါ
        sed -i 's|#android.sdk_path =|android.sdk_path = /usr/local/lib/android/sdk|g' buildozer.spec
        
        # မလိုအပ်တဲ့ ပြဿနာတွေ ကာကွယ်ဖို့အတွက် buildozer ကို non-interactive mode (y အလိုအလျောက်ဖြေစနစ်) နဲ့ Run ခိုင်းလိုက်ပါတယ်
        buildozer -v android debug
