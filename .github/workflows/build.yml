name: Build Android APK with Buildozer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install System Dependencies for Buildozer
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev xclip libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
        python -m pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Run Buildozer and Accept Licenses Automatically
      run: |
        # Buildozer ကို စတင် Run ပြီး License တောင်းလာရင် အလိုအလျောက် Yes (y) လို့ ဖြေခိုင်းထားခြင်းဖြစ်ပါတယ်
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: .buildozer/android/platform/build-android/*/build/outputs/apk/*/*.apk
