name: Mobile App Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Android Build အတွက် ပိုမိုတည်ငြိမ်သော ပတ်ဝန်းကျင်

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libsqlite3-dev libb2-dev liblzma-dev libffi-dev uuid-dev execstack libarchive-tools
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Initialize Buildozer Config
      run: |
        # buildozer.spec ဖိုင် မရှိသေးလျှင် အလိုအလျောက် ဆောက်ပေးမည်
        if [ ! -f buildozer.spec ]; then buildozer init; fi
        
        # အခြေခံ App Specification များကို ပြင်ဆင်ခြင်း
        sed -i 's/title = My Application/title = Myanmar AI Brain/g' buildozer.spec
        sed -i 's/package.name = myapp/package.name = myanmar_ai_brain/g' buildozer.spec
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,requests,pydantic/g' buildozer.spec

    - name: Build Android APK
      run: |
        # Android .apk ထုတ်လုပ်ခြင်း (ပထမအကြိမ်တွင် မိနစ်အနည်းငယ် ကြာမြင့်နိုင်သည်)
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Myanmar-AI-Brain-Android-APK
        path: bin/*.apk
