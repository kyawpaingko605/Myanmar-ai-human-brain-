name: Python Application Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'
        cache: 'pip' # Package တွေကို Cache လုပ်ပြီး Build speed မြန်စေဖို့

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        pip install flake8
        # Syntax error သို့မဟုတ် Python code အမှားတွေကို စစ်ဆေးရန်
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit code ကို zero ပေးထားပြီး warning တွေကို build မကျစေဘဲ စစ်ရုံပဲစစ်ရန်
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Test Application
      run: |
        # သင့် app.py ကို script အနေနဲ့ အလုပ်လုပ်လား စမ်းသပ်စစ်ဆေးခြင်း
        # (တကယ်လို့ pytest သုံးထားရင် `pytest` လို့ ပြောင်းရေးနိုင်ပါတယ်)
        python app.py --help || echo "Application executed successfully or help command triggered"
